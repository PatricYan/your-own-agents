# Example 7: Everything from Files
#
# Goals, prompts, and permissions are all loaded from separate files.
# This keeps the pipeline YAML minimal and configs reusable across pipelines.
#
# File layout:
#   examples/goals/research.md              — what the researcher should do
#   examples/goals/write-report.md          — what the writer should do
#   examples/prompts/researcher.md          — researcher persona and rules
#   examples/prompts/report-writer.md       — writer persona and rules
#   examples/permissions/read-only.yaml     — read + search, no modifications
#   examples/permissions/read-write.yaml    — read + edit + write
#
# Run:
#   agentpipe run examples/07-file-config.yaml --input '{"topic": "AI agents"}' --watch

name: file-configured-pipeline
execution_strategy: fail_fast
models_file: examples/models.yaml

tasks:
  - name: researcher
    goal: examples/goals/research.md
    system_prompt: examples/prompts/researcher.md
    permissions: examples/permissions/read-only.yaml
    models: [gpt-4o, claude, local-llama]
    max_iterations: 10

  - name: writer
    goal: examples/goals/write-report.md
    system_prompt: examples/prompts/report-writer.md
    permissions: examples/permissions/read-write.yaml
    models: [claude, gpt-4o]
    depends_on: researcher
    max_iterations: 10
