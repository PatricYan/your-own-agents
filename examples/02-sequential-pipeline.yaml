# Example 2: Sequential Pipeline
# Two agents in sequence — research then summarize.
# The output of the first agent flows as input to the second.
#
# Run:
#   agentpipe run examples/02-sequential-pipeline.yaml --input '{"topic": "benefits of open source software"}' --watch

name: research-and-summarize
execution_strategy: fail_fast
models_file: examples/models.yaml

tasks:
  - name: research
    goal: examples/goals/research-with-shell.md
    primary_model: default
    permissions:
      "*": deny
      read: allow
      bash: allow
    max_iterations: 5

  - name: summarize
    goal: examples/goals/summarize.md
    primary_model: default
    depends_on: research
    max_iterations: 3
