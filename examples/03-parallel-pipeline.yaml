# Example 3: Parallel Pipeline
# Four agents: one starts, two run in parallel, one merges results.
# This demonstrates fan-out / fan-in like Airflow.
#
# Run:
#   agentpipe agents create parallel-demo --pipeline examples/03-parallel-pipeline.yaml
#   agentpipe run parallel-demo --input '{"project": "agentpipe"}' --watch

name: parallel-analysis
execution_strategy: fail_fast

tasks:
  - name: gather
    goal: examples/goals/prepare-analysis.md
    primary_model: default
    max_iterations: 3

  - name: analyze-code
    goal: examples/goals/analyze-code-quality.md
    primary_model: default
    permissions: examples/permissions/reviewer.yaml
    depends_on: gather
    max_iterations: 5

  - name: analyze-docs
    goal: examples/goals/analyze-docs.md
    primary_model: default
    permissions: examples/permissions/reviewer.yaml
    depends_on: gather
    max_iterations: 5

  - name: report
    goal: examples/goals/combine-report.md
    primary_model: default
    depends_on:
      - analyze-code
      - analyze-docs
    max_iterations: 3
