# Example 6: Multi-Model Pipeline
# Different agents use different models.
#
# Setup:
#   agentpipe models register gpt-4o --provider openai --connection '{"api_key_env": "OPENAI_API_KEY", "model": "gpt-4o"}'
#   agentpipe models register claude --provider anthropic --connection '{"api_key_env": "ANTHROPIC_API_KEY", "model": "claude-sonnet-4-20250514"}'
#
# Run:
#   agentpipe agents create multi-model --pipeline examples/06-multi-model.yaml
#   agentpipe run multi-model --input '{"task": "write a sorting algorithm"}' --watch

name: multi-model-pipeline
execution_strategy: fail_fast

tasks:
  - name: plan
    goal: examples/goals/create-plan.md
    primary_model: gpt-4o
    max_iterations: 3

  - name: implement
    goal: examples/goals/implement-plan.md
    primary_model: claude
    fallback_models: [gpt-4o]
    permissions: examples/permissions/developer.yaml
    depends_on: plan
    max_iterations: 10

  - name: test
    goal: examples/goals/run-tests.md
    primary_model: gpt-4o
    permissions: examples/permissions/tester.yaml
    depends_on: implement
    max_iterations: 5
