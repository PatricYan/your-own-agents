# Example 4: Permission Control
# Goals, prompts, and permissions all loaded from files.
#
# Run:
#   agentpipe run examples/04-permissions-demo.yaml --input '{"file": "examples/04-permissions-demo.yaml"}' --watch

name: permission-controlled-pipeline
execution_strategy: fail_fast
models_file: examples/models.yaml

tasks:
  - name: reviewer
    goal: examples/goals/review-file.md
    system_prompt: examples/prompts/code-reviewer.md
    primary_model: default
    permissions: examples/permissions/reviewer.yaml
    max_iterations: 5

  - name: fixer
    goal: examples/goals/write-fixes.md
    system_prompt: examples/prompts/code-fixer.md
    primary_model: default
    permissions: examples/permissions/developer.yaml
    depends_on: reviewer
    max_iterations: 5

  - name: verifier
    goal: examples/goals/verify-fixes.md
    system_prompt: examples/prompts/tester.md
    primary_model: default
    permissions: examples/permissions/tester.yaml
    depends_on: fixer
    max_iterations: 5
