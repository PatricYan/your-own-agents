# Example 5: Conditional Routing
# The evaluator scores the input. Based on the score,
# execution routes to either the 'publish' or 'improve' agent.
#
# Run:
#   agentpipe run examples/05-conditional-routing.yaml --input '{"text": "AgentPipe is an Airflow-inspired agent framework."}' --watch

name: quality-gate
execution_strategy: fail_fast
models_file: examples/models.yaml

tasks:
  - name: evaluate
    goal: examples/goals/evaluate-quality.md
    primary_model: default
    max_iterations: 3

  - name: publish
    goal: examples/goals/publish.md
    primary_model: default
    max_iterations: 3

  - name: improve
    goal: examples/goals/improve-text.md
    primary_model: default
    max_iterations: 3

edges:
  - from: evaluate
    to: publish
    when:
      expression: "quality_score > 0.7"
  - from: evaluate
    to: improve
    when:
      expression: "quality_score <= 0.7"
