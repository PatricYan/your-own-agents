# Example 5: Conditional Routing
# The evaluator scores the input. Based on the score,
# execution routes to either the 'publish' or 'improve' agent.
#
# Run:
#   agentpipe agents create quality-gate --pipeline examples/05-conditional-routing.yaml
#   agentpipe run quality-gate --input '{"text": "AgentPipe is an Airflow-inspired agent framework."}' --watch

name: quality-gate
execution_strategy: fail_fast

tasks:
  - name: evaluate
    goal: examples/goals/evaluate-quality.md
    primary_model: default
    max_iterations: 3

  - name: publish
    goal: examples/goals/publish.md
    primary_model: default
    max_iterations: 3

  - name: improve
    goal: examples/goals/improve-text.md
    primary_model: default
    max_iterations: 3

edges:
  - source: evaluate
    target: publish
    condition:
      expression: "quality_score > 0.7"
  - source: evaluate
    target: improve
    condition:
      expression: "quality_score <= 0.7"
